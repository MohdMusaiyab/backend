version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: booking_postgres
    environment:
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_secret
      POSTGRES_DB: booking_db
    ports:
      - "5432:5432"
    volumes:
      - booking_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: booking_api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=host=db user=booking_user password=booking_secret dbname=booking_db port=5432 sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  booking_db_data:
